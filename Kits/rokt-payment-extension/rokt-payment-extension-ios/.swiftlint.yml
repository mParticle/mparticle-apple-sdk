---
disabled_rules:
  - identifier_name
  - force_cast
  - weak_delegate
  - function_parameter_count
  - file_length
  - type_body_length
  - cyclomatic_complexity
  - function_body_length

nesting:
  type_level:
    warning: 3
    error: 6

line_length:
  warning: 130
  error: 160
  ignores_comments: true
  ignores_urls: true

type_name:
  min_length: 1
  max_length: 40

excluded:
  - Tests
  - .build
