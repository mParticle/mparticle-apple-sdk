name: Cross Platform Tests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "16.4"

jobs:
  run-ios-tests:
    timeout-minutes: 30
    runs-on: macOS-15
    steps:
      - name: "Checkout Cross Platform Tests"
        uses: actions/checkout@v6
        with:
          submodules: "true"
          repository: mParticle/crossplatform-sdk-tests
          fetch-depth: 1
      - name: "Checkout iOS SDK"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          path: .sdks/apple
      - name: "Install JDK 17"
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
      - name: Cache Ruby gems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.gem
          key: gems-cocoapods-${{ runner.os }}-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: gems-cocoapods-${{ runner.os }}
      - name: "Install Cocoapods"
        run: gem install cocoapods cocoapods-generate --user-install && echo "$(ruby -e 'puts Gem.user_dir')/bin" >> $GITHUB_PATH
      - name: Choose Xcode version
        run: xcode-select -p; sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer; xcode-select -p
      - name: Run Tests
        run: ./gradlew runIos
      - name: Archive Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-test-results
          path: Users/runner/Library/Developer/Xcode/DerivedData
